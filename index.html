<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 2026 Live Dashboard</title>
    <style>
        /* Discord-inspired Dark Theme */
        :root {
            --bg-color: #313338;
            --card-color: #2b2d31;
            --text-main: #f2f3f5;
            --text-muted: #949ba4;
            --accent: #5865F2;
            --strike: #dbdee1;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin-bottom: 5px; }
        .subtitle { color: var(--text-muted); margin-bottom: 30px; text-align: center;}

        .container {
            width: 100%;
            max-width: 800px;
        }

        /* Top Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 30px;
            background-color: var(--card-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .toggle-label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            color: var(--text-main);
            user-select: none;
        }

        .toggle-label input {
            accent-color: var(--accent);
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* Next GP Callout Banner */
        #next-gp-banner {
            background: linear-gradient(135deg, #1e1f22 0%, #2b2d31 100%);
            border-left: 5px solid #ed1c24; /* F1 Red */
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 40px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .countdown-title { color: var(--text-muted); text-transform: uppercase; font-size: 12px; font-weight: bold; letter-spacing: 1px;}
        #countdown-timer { font-size: 2.5rem; font-weight: 800; font-family: monospace; color: #ed1c24; margin: 10px 0; }

        /* Calendar Grid */
        .card {
            background-color: var(--card-color);
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .race-header {
            font-size: 1.4rem;
            font-weight: bold;
            padding: 15px 20px;
            background-color: #2b2d31;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.2s ease;
            user-select: none;
        }

        .race-header:hover {
            background-color: #383a40; 
        }

        .toggle-icon {
            font-size: 1rem;
            color: var(--text-muted);
            transition: transform 0.3s ease;
        }

        .session-container {
            padding: 0 20px 15px 20px;
            border-top: 1px solid #1e1f22;
            margin-top: -1px; 
        }

        .session {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-family: monospace;
            font-size: 1rem;
        }

        .session-name {
            background-color: #1e1f22;
            padding: 2px 6px;
            border-radius: 4px;
            color: #dbdee1;
        }

        .session-time { color: var(--text-muted); }

        /* Real-time Strikethrough Logic */
        .past-session .session-name, 
        .past-session .session-time {
            text-decoration: line-through;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <h1>🏎️ F1 2026 Live Calendar</h1>
    <div class="subtitle">Auto-syncs to your local timezone</div>

    <div class="container">
        
        <div class="controls">
            <label class="toggle-label">
                <input type="checkbox" id="toggle-old-gps" onchange="updateView()"> Show Past Races
            </label>
            <label class="toggle-label">
                <input type="checkbox" id="toggle-time-format" onchange="updateView()"> Show Relative Time
            </label>
        </div>

        <div id="next-gp-banner" style="display: none;">
            <div class="countdown-title">Next Race Countdown</div>
            <div id="countdown-timer">Loading...</div>
            <div id="next-gp-details"></div>
        </div>

        <div id="pre-season-container"></div>
        <div id="schedule-container">
            <div style="text-align:center; color:#949ba4;">Fetching live data from Jolpica API...</div>
        </div>
    </div>

    <script>
        const FLAG_EMOJIS = {
            "Bahrain Grand Prix": "🇧🇭", "Saudi Arabian Grand Prix": "🇸🇦",
            "Australian Grand Prix": "🇦🇺", "Japanese Grand Prix": "🇯🇵",
            "Chinese Grand Prix": "🇨🇳", "Miami Grand Prix": "🇺🇸",
            "Emilia Romagna Grand Prix": "🇮🇹", "Monaco Grand Prix": "🇲🇨",
            "Canadian Grand Prix": "🇨🇦", "Spanish Grand Prix": "🇪🇸",
            "Austrian Grand Prix": "🇦🇹", "British Grand Prix": "🇬🇧",
            "Hungarian Grand Prix": "🇭🇺", "Belgian Grand Prix": "🇧🇪",
            "Dutch Grand Prix": "🇳🇱", "Italian Grand Prix": "🇮🇹",
            "Azerbaijan Grand Prix": "🇦🇿", "Singapore Grand Prix": "🇸🇬",
            "United States Grand Prix": "🇺🇸", "Mexico City Grand Prix": "🇲🇽",
            "São Paulo Grand Prix": "🇧🇷", "Las Vegas Grand Prix": "🇺🇸",
            "Qatar Grand Prix": "🇶🇦", "Abu Dhabi Grand Prix": "🇦🇪"
        };

        // UI State
        let showOldGPs = false;
        let showRelativeTime = false;
        let collapsedState = {}; 
        let cachedRaces = []; 

        function updateView() {
            showOldGPs = document.getElementById('toggle-old-gps').checked;
            showRelativeTime = document.getElementById('toggle-time-format').checked;
            renderPreSeason();
            renderDashboardCards();
        }

        // --- SAFE TIME PARSER ---
        function getUnixTime(dateStr, timeStr) {
            try {
                const isoString = `${dateStr}T${timeStr || "00:00:00Z"}`;
                return new Date(isoString).getTime();
            } catch (e) {
                return Infinity; 
            }
        }

        // --- DISCORD STYLE RELATIVE TIME FORMATTER ---
        function getDiscordRelativeTime(targetTime, now) {
            const diff = targetTime - now;
            const isPast = diff < 0;
            const absDiff = Math.abs(diff);

            const seconds = Math.floor(absDiff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            const months = Math.floor(days / 30);

            let str = "";
            if (months > 0) {
                str = `${months} month${months > 1 ? 's' : ''}`;
            } else if (days > 0) {
                str = `${days} day${days > 1 ? 's' : ''}`;
            } else if (hours > 0) {
                str = `${hours} hour${hours > 1 ? 's' : ''}`;
            } else if (minutes > 0) {
                str = `${minutes} minute${minutes > 1 ? 's' : ''}`;
            } else {
                str = `a few seconds`;
            }

            return isPast ? `${str} ago` : `in ${str}`;
        }

        // --- FORMAT SESSION ROWS ---
        function createSessionHTML(name, unixTime, currentTime) {
            const isPast = unixTime < currentTime;
            let timeString = "";

            if (showRelativeTime) {
                timeString = getDiscordRelativeTime(unixTime, currentTime);
            } else {
                const dateObj = new Date(unixTime);
                timeString = dateObj.toLocaleString([], { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' });
            }
            
            return `
                <div class="session ${isPast ? 'past-session' : ''}">
                    <span class="session-name">${name}</span>
                    <span class="session-time">${timeString}</span>
                </div>
            `;
        }

        // --- TOGGLE FUNCTION ---
        function toggleCard(raceName) {
            collapsedState[raceName] = !collapsedState[raceName];
            
            const safeId = raceName.replace(/\s+/g, '-');
            const container = document.getElementById(`sessions-${safeId}`);
            const icon = document.getElementById(`icon-${safeId}`);
            
            if (collapsedState[raceName]) {
                container.style.display = 'none';
                icon.style.transform = 'rotate(-90deg)';
            } else {
                container.style.display = 'block';
                icon.style.transform = 'rotate(0deg)';
            }
        }

        // --- RENDER HARDCODED PRE-SEASON ---
        function renderPreSeason() {
            const container = document.getElementById('pre-season-container');
            const now = Date.now();
            
            const testing = [
                { name: "Week 1 Day 1", time: 1770822000000 },
                { name: "Week 1 Day 2", time: 1770908400000 },
                { name: "Week 1 Day 3", time: 1770994800000 },
                { name: "Week 2 Day 1", time: 1771398000000 },
                { name: "Week 2 Day 2", time: 1771484400000 },
                { name: "Week 2 Day 3", time: 1771570800000 }
            ];

            const preSeasonName = "Pre-Season Testing";
            const lastSessionTime = testing[testing.length - 1].time;
            const isPastPreSeason = lastSessionTime < now;

            if (isPastPreSeason && !showOldGPs) {
                container.innerHTML = "";
                return;
            }
            
            // If Pre-season is NOT over yet, keep it expanded by default. If it is over, collapse it.
            if (collapsedState[preSeasonName] === undefined) {
                collapsedState[preSeasonName] = isPastPreSeason ? true : false;
            }

            const isCollapsed = collapsedState[preSeasonName];
            const safeId = preSeasonName.replace(/\s+/g, '-');

            let html = `
                <div class="card" id="pre-season-card">
                    <div class="race-header" onclick="toggleCard('${preSeasonName}')">
                        <span>🇧🇭 ${preSeasonName}</span>
                        <span class="toggle-icon" id="icon-${safeId}" style="transform: rotate(${isCollapsed ? '-90deg' : '0deg'})">▼</span>
                    </div>
                    <div class="session-container" id="sessions-${safeId}" style="display: ${isCollapsed ? 'none' : 'block'}">
                        <div style="padding-top: 15px;">
            `;

            testing.forEach(session => {
                html += createSessionHTML(session.name, session.time, now);
            });
            
            html += `</div></div></div>`;
            container.innerHTML = html;
        }

        // --- RENDER DASHBOARD CARDS ---
        function renderDashboardCards() {
            if (cachedRaces.length === 0) return;
            const now = Date.now();

            // 1. Find Next GP for the Banner and Expansion Logic
            let upcomingRaces = cachedRaces.filter(r => getUnixTime(r.date, r.time) > now);
            let nextRace = upcomingRaces.reduce((closest, r) => {
                return getUnixTime(r.date, r.time) < getUnixTime(closest.date, closest.time) ? r : closest;
            }, upcomingRaces[0]);

            if (nextRace) startCountdown(nextRace);

            // 2. Custom Sort
            const displaySchedule = [...cachedRaces].sort((a, b) => {
                const nameA = a.raceName.toLowerCase();
                const nameB = b.raceName.toLowerCase();
                const getRank = (name, race) => {
                    if (name.includes("australia")) return 1;
                    if (name.includes("china") || name.includes("chinese")) return 2;
                    if (name.includes("japan")) return 3;
                    if (name.includes("bahrain")) return 4;
                    if (name.includes("saudi")) return 5;
                    return getUnixTime(race.date, race.time);
                };
                return getRank(nameA, a) - getRank(nameB, b);
            });

            // 3. Build the Cards
            let scheduleHTML = "";
            displaySchedule.forEach(race => {
                const flag = FLAG_EMOJIS[race.raceName] || "🏁";
                const safeId = race.raceName.replace(/\s+/g, '-');
                const raceEndTime = getUnixTime(race.date, race.time);
                const isPastRace = raceEndTime < now;
                const isNextUpcomingRace = nextRace && race.raceName === nextRace.raceName;

                // Hide old races logic
                if (isPastRace && !showOldGPs) {
                    return; 
                }

                // If we haven't set a state for this card yet:
                // Keep the 'upcoming' race open (false). Collapse all others (true).
                if (collapsedState[race.raceName] === undefined) {
                    collapsedState[race.raceName] = isNextUpcomingRace ? false : true;
                }

                const isCollapsed = collapsedState[race.raceName];

                let cardHTML = `
                    <div class="card">
                        <div class="race-header" onclick="toggleCard('${race.raceName}')">
                            <span>${flag} ${race.raceName}</span>
                            <span class="toggle-icon" id="icon-${safeId}" style="transform: rotate(${isCollapsed ? '-90deg' : '0deg'})">▼</span>
                        </div>
                        <div class="session-container" id="sessions-${safeId}" style="display: ${isCollapsed ? 'none' : 'block'}">
                            <div style="padding-top: 15px;">
                `;
                
                if (race.FirstPractice) cardHTML += createSessionHTML("Practice 1", getUnixTime(race.FirstPractice.date, race.FirstPractice.time), now);
                
                if (race.Sprint) {
                    if (race.SprintQualifying) cardHTML += createSessionHTML("Sprint Quali", getUnixTime(race.SprintQualifying.date, race.SprintQualifying.time), now);
                    cardHTML += createSessionHTML("Sprint", getUnixTime(race.Sprint.date, race.Sprint.time), now);
                } else {
                    if (race.SecondPractice) cardHTML += createSessionHTML("Practice 2", getUnixTime(race.SecondPractice.date, race.SecondPractice.time), now);
                    if (race.ThirdPractice) cardHTML += createSessionHTML("Practice 3", getUnixTime(race.ThirdPractice.date, race.ThirdPractice.time), now);
                }
                
                if (race.Qualifying) cardHTML += createSessionHTML("Qualifying", getUnixTime(race.Qualifying.date, race.Qualifying.time), now);
                cardHTML += createSessionHTML("Race", getUnixTime(race.date, race.time), now);
                
                cardHTML += `</div></div></div>`;
                scheduleHTML += cardHTML;
            });

            if (scheduleHTML === "") scheduleHTML = `<div style="text-align:center; color:#949ba4;">Season has ended! Check 'Show Past Races' to view history.</div>`;
            document.getElementById('schedule-container').innerHTML = scheduleHTML;
        }

        // --- FETCH API DATA ---
        async function fetchAPI() {
            try {
                const response = await fetch("https://api.jolpi.ca/ergast/f1/current.json");
                const data = await response.json();
                cachedRaces = data.MRData.RaceTable.Races;
                renderDashboardCards();
            } catch (error) {
                document.getElementById('schedule-container').innerHTML = `<div style="color: red;">Error loading API data. Please refresh.</div>`;
                console.error(error);
            }
        }

        // --- LIVE COUNTDOWN ENGINE ---
        let countdownInterval;
        function startCountdown(nextRace) {
            document.getElementById('next-gp-banner').style.display = 'block';
            const flag = FLAG_EMOJIS[nextRace.raceName] || "🏁";
            
            document.getElementById('next-gp-details').innerHTML = `<div style="font-size: 1.4rem; font-weight: bold;">${flag} ${nextRace.raceName}</div>`;
            const raceTargetTime = getUnixTime(nextRace.date, nextRace.time);

            clearInterval(countdownInterval); 
            countdownInterval = setInterval(() => {
                const now = Date.now();
                const distance = raceTargetTime - now;

                if (distance < 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('countdown-timer').innerHTML = "RACE HAS STARTED!";
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById('countdown-timer').innerHTML = 
                    `${days}d ${hours}h ${minutes}m ${seconds}s`;
            }, 1000);
        }

        // --- INITIALIZATION ---
        renderPreSeason();
        fetchAPI();
        
        setInterval(fetchAPI, 600000);
        setInterval(() => {
            renderPreSeason();
            renderDashboardCards();
        }, 60000);

    </script>
</body>
